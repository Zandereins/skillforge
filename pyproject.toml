[project]
name = "skillforge"
version = "5.3.0"
description = "Autonomous skill improvement and measurement framework for Claude Code"
license = {text = "MIT"}
requires-python = ">=3.9"
readme = "README.md"
keywords = ["claude-code", "skills", "scoring", "evaluation", "autonomous-improvement"]
authors = [
    {name = "Franz Paul"}
]

[project.urls]
Repository = "https://github.com/Zandereins/skillforge"

[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["scoring", "shared", "nlp"]
