name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_passed: ${{ steps.integration.outputs.test_passed }}
      test_total: ${{ steps.integration.outputs.test_total }}
      composite_score: ${{ steps.scorer.outputs.composite_score }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.9'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run integration tests
        id: integration
        working-directory: skills/schliff
        run: |
          OUTPUT=$(bash scripts/test-integration.sh --no-runtime-auto 2>&1) || true
          echo "$OUTPUT"
          PASSED=$(echo "$OUTPUT" | grep -oP 'Results:\s*\K[0-9]+(?=\s*passed)' || echo "0")
          FAILED=$(echo "$OUTPUT" | grep -oP 'Results:\s*[0-9]+\s*passed,\s*\K[0-9]+(?=\s*failed)' || echo "0")
          TOTAL=$((PASSED + FAILED))
          echo "test_passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "test_total=$TOTAL" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -gt 0 ]; then exit 1; fi

      - name: Run self-tests
        working-directory: skills/schliff
        run: bash scripts/test-self.sh

      - name: Run scorer
        id: scorer
        working-directory: skills/schliff
        run: |
          RESULT=$(python3 scripts/score-skill.py SKILL.md --json 2>/dev/null)
          COMPOSITE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['composite_score'])")
          echo "Composite score: $COMPOSITE"
          echo "composite_score=$COMPOSITE" >> "$GITHUB_OUTPUT"
          python3 -c "import sys; assert float(sys.argv[1]) >= 90, f'Score {sys.argv[1]} below threshold'" "$COMPOSITE"

      - name: Run eval suite
        working-directory: skills/schliff
        run: bash scripts/run-eval.sh SKILL.md eval-suite.json --no-runtime-auto 2>/dev/null

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        working-directory: skills/schliff
        run: python3 -m pytest tests/unit/ -v

      - name: Run proof test
        working-directory: skills/schliff
        run: bash tests/proof/test-proof.sh

  # Badge generation using dynamic badges
  # Setup steps:
  #   1. Create a public GitHub Gist (https://gist.github.com) — content doesn't matter
  #   2. Copy the Gist ID from the URL (e.g., https://gist.github.com/user/130bb61237b5b9b1536718e6a2296d4a)
  #   3. Create a repository secret named GIST_TOKEN with a PAT that has gist scope
  #   4. Replace 130bb61237b5b9b1536718e6a2296d4a below with your actual Gist ID
  badges:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Tests badge
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 130bb61237b5b9b1536718e6a2296d4a
          filename: schliff-tests.json
          label: tests
          message: "${{ needs.test.outputs.test_passed }}/${{ needs.test.outputs.test_total }} passed"
          color: ${{ needs.test.outputs.test_passed == needs.test.outputs.test_total && 'brightgreen' || 'red' }}

      - name: Compute grade
        id: grade
        shell: bash
        env:
          SCORE: ${{ needs.test.outputs.composite_score }}
        run: |
          if [ "$(echo "$SCORE >= 95" | bc -l)" -eq 1 ]; then GRADE="S";
          elif [ "$(echo "$SCORE >= 85" | bc -l)" -eq 1 ]; then GRADE="A";
          elif [ "$(echo "$SCORE >= 75" | bc -l)" -eq 1 ]; then GRADE="B";
          elif [ "$(echo "$SCORE >= 65" | bc -l)" -eq 1 ]; then GRADE="C";
          elif [ "$(echo "$SCORE >= 50" | bc -l)" -eq 1 ]; then GRADE="D";
          else GRADE="F"; fi
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"

      - name: Score badge
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 130bb61237b5b9b1536718e6a2296d4a
          filename: schliff-score.json
          label: Schliff
          message: "${{ needs.test.outputs.composite_score }}/100 [${{ steps.grade.outputs.grade }}]"
          color: >-
            ${{
              needs.test.outputs.composite_score >= 95 && 'brightgreen' ||
              needs.test.outputs.composite_score >= 90 && 'green' ||
              needs.test.outputs.composite_score >= 80 && 'yellow' ||
              'red'
            }}
