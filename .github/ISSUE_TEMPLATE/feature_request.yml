name: Feature Request
description: Suggest a new scoring dimension, detection rule, or CLI feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What scoring gap or missing capability are you hitting?
      placeholder: "The efficiency scorer doesn't detect..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How should Schliff handle this?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about (optional)

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scoring dimension
        - anti-gaming detection
        - CLI command
        - GitHub Action
        - improvement loop
        - episodic memory
        - doctor / mesh
        - other
    validations:
      required: false
