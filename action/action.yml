name: 'Schliff Skill Score'
description: 'Score Claude Code skills across 7 dimensions. The quality gate for SKILL.md files.'
branding:
  icon: 'award'
  color: 'purple'
inputs:
  skill-path:
    description: 'Path to SKILL.md file (relative to repo root)'
    required: true
  eval-suite:
    description: 'Path to eval-suite.json (auto-discovered if not set)'
    required: false
  minimum-score:
    description: 'Minimum composite score to pass (0-100). PR fails if below.'
    required: false
    default: '0'
  comment-on-pr:
    description: 'Post score as PR comment'
    required: false
    default: 'true'
  schliff-version:
    description: 'Schliff version to install (e.g. "6.3.0", ">=7.0"). Defaults to latest.'
    required: false
    default: ''
outputs:
  composite:
    description: 'Composite score (0-100)'
    value: ${{ steps.score.outputs.composite }}
  grade:
    description: 'Grade letter (S/A/B/C/D/F)'
    value: ${{ steps.score.outputs.grade }}
  result_b64:
    description: 'Full JSON score result (base64 encoded)'
    value: ${{ steps.score.outputs.result_b64 }}
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: '3.12'

    - name: Install Schliff scorer
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.schliff-version }}
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          # Support both exact versions ("6.3.0") and specifiers (">=7.0")
          case "$INPUT_VERSION" in
            \>*|\<*|~*|!*) pip install "schliff$INPUT_VERSION" ;;
            *)              pip install "schliff==$INPUT_VERSION" ;;
          esac
        else
          pip install schliff
        fi

    - name: Run scorer
      id: score
      shell: bash
      env:
        INPUT_SKILL_PATH: ${{ inputs.skill-path }}
        INPUT_EVAL_SUITE: ${{ inputs.eval-suite }}
      run: |
        SKILL_FULL="${GITHUB_WORKSPACE}/${INPUT_SKILL_PATH}"
        EVAL_FLAG=""
        if [ -n "${INPUT_EVAL_SUITE}" ]; then
          EVAL_FLAG="--eval-suite"
          EVAL_PATH="${GITHUB_WORKSPACE}/${INPUT_EVAL_SUITE}"
        fi
        if [ -n "$EVAL_FLAG" ]; then
          RESULT=$(schliff score "$SKILL_FULL" "$EVAL_FLAG" "$EVAL_PATH" --json 2>/tmp/schliff_stderr) || true
        else
          RESULT=$(schliff score "$SKILL_FULL" --json 2>/tmp/schliff_stderr) || true
        fi

        if [ -z "$RESULT" ] || ! echo "$RESULT" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
          echo "::error::Schliff scorer produced invalid output. stderr: $(cat /tmp/schliff_stderr 2>/dev/null)"
          exit 1
        fi

        COMPOSITE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['composite_score'])")
        echo "composite=$COMPOSITE" >> "$GITHUB_OUTPUT"

        GRADE=$(SCORE_VAL="$COMPOSITE" python3 -c "
        import os
        s = float(os.environ['SCORE_VAL'])
        g = 'S' if s >= 95 else 'A' if s >= 85 else 'B' if s >= 75 else 'C' if s >= 65 else 'D' if s >= 50 else 'F'
        print(g)
        ")
        echo "grade=$GRADE" >> "$GITHUB_OUTPUT"

        # Write result to temp file to avoid heredoc injection
        echo "$RESULT" > /tmp/schliff_result.json
        RESULT_B64=$(base64 < /tmp/schliff_result.json)
        echo "result_b64=$RESULT_B64" >> "$GITHUB_OUTPUT"
        echo "Score: $COMPOSITE/100 [$GRADE]"

    - name: Check minimum score
      if: inputs.minimum-score != '0'
      shell: bash
      env:
        COMPOSITE: ${{ steps.score.outputs.composite }}
        MINIMUM: ${{ inputs.minimum-score }}
      run: |
        python3 -c "
        import sys, os
        score = float(os.environ['COMPOSITE'])
        minimum = float(os.environ['MINIMUM'])
        if score < minimum:
            print(f'::error::Score {score} is below minimum {minimum}')
            sys.exit(1)
        print(f'Score {score} passes minimum {minimum}')
        "

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const b64 = '${{ steps.score.outputs.result_b64 }}';
          const result = JSON.parse(Buffer.from(b64, 'base64').toString('utf8'));
          const score = result.composite_score;
          const dims = result.dimensions;
          const grade = '${{ steps.score.outputs.grade }}';
          const minimum = parseFloat('${{ inputs.minimum-score }}') || 0;
          const passed = minimum === 0 || score >= minimum;
          const icon = score >= 95 ? '🟢' : score >= 75 ? '🟡' : '🔴';

          // Unicode progress bar
          function bar(val) {
            if (val < 0) return '—';
            const filled = Math.round(val / 5);
            return '█'.repeat(filled) + '░'.repeat(20 - filled) + ` ${Math.round(val)}`;
          }

          const dimOrder = ['structure', 'triggers', 'quality', 'edges', 'efficiency', 'composability', 'clarity'];

          let body = `<!-- schliff-score-comment -->\n`;
          body += `## ${icon} Schliff Score: ${score}/100 [${grade}]\n\n`;

          if (minimum > 0) {
            body += passed
              ? `✅ Passes minimum score of ${minimum}\n\n`
              : `❌ Below minimum score of ${minimum}\n\n`;
          }

          body += `| Dimension | Score | | \n`;
          body += `|:----------|------:|:----|\n`;
          for (const dim of dimOrder) {
            if (dims[dim] === undefined) continue;
            const s = dims[dim];
            if (s < 0) {
              body += `| ${dim} | — | *not measured* |\n`;
            } else {
              const dimIcon = s >= 75 ? '🟢' : s >= 50 ? '🟡' : '🔴';
              body += `| ${dim} | ${Math.round(s)}/100 | ${dimIcon} \`${bar(s)}\` |\n`;
            }
          }

          if (result.warnings?.length) {
            body += `\n<details><summary><b>⚠️ Warnings (${result.warnings.length})</b></summary>\n\n`;
            result.warnings.forEach(w => body += `- ${w}\n`);
            body += `\n</details>\n`;
          }

          body += `\n---\n<sub>Scored by [Schliff](https://github.com/Zandereins/schliff) · [Try the playground](https://play.schliff.dev)</sub>`;

          // Update existing comment or create new one
          const marker = '<!-- schliff-score-comment -->';
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });
          const existing = comments.find(c => c.body?.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
